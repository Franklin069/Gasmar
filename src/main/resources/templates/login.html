<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - GasFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex items-center justify-center h-screen bg-slate-900">

<div class="bg-white p-10 rounded-2xl w-96 text-center">
    <h1 class="text-2xl font-bold mb-6">GasFlow</h1>

    <form action="/dashboard">
        <input type="text" placeholder="Usuário" class="w-full mb-4 p-3 border rounded">
        <input type="password" placeholder="Senha" class="w-full mb-4 p-3 border rounded">

        <button class="w-full bg-green-500 text-white p-3 rounded">
            Entrar
        </button>
    </form>
</div>

</body>
</html>
