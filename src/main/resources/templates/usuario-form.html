<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GasFlow | Novo Integrante</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #e9edf3;
        }

        .form-shell {
            background: #f5f7fb;
            border-radius: 42px;
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.10);
        }

        .field-label {
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            color: #9aa5b4;
            letter-spacing: 0.04em;
            margin-bottom: 10px;
        }

        .input-soft {
            width: 100%;
            background: white;
            border: 1px solid #edf1f5;
            border-radius: 22px;
            padding: 18px 24px;
            font-size: 18px;
            color: #334155;
            outline: none;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(15, 23, 42, 0.03);
        }

        .input-soft::placeholder {
            color: #b6bfcb;
        }

        .input-soft:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.12);
        }

        .btn-cancel {
            color: #a1a8b3;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .btn-save {
            background: #0ea5e9;
            color: white;
            font-weight: 800;
            text-transform: uppercase;
            border-radius: 22px;
            padding: 18px 42px;
            box-shadow: 0 12px 24px rgba(14, 165, 233, 0.18);
            transition: 0.2s ease;
        }

        .btn-save:hover {
            background: #0284c7;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <main class="form-shell w-full max-w-4xl px-14 py-12">
        <h1 class="text-[34px] font-extrabold text-slate-800 mb-12">Novo Integrante</h1>

        <form th:action="@{/usuarios/salvar}" method="post" th:object="${usuario}" class="space-y-8">

            <div>
                <label class="field-label">Nome Completo</label>
                <input type="text"
                       th:field="*{nome}"
                       class="input-soft"
                       placeholder="Ex: Lauro Andrade"
                       required>
            </div>

            <div>
                <label class="field-label">E-mail Corporativo</label>
                <input type="email"
                       th:field="*{email}"
                       class="input-soft"
                       placeholder="lauro@gasmar.com.br"
                       required>
            </div>

            <div>
                <label class="field-label">CPF</label>
                <input type="text"
                       th:field="*{cpf}"
                       class="input-soft"
                       placeholder="000.000.000-00"
                       maxlength="14"
                       oninput="formatarCPF(this)"
                       required>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="field-label">Setor</label>
                    <select th:field="*{setor.id}" class="input-soft" required>
                        <option value="">Selecione</option>
                        <option th:each="setor : ${setores}"
                                th:value="${setor.id}"
                                th:text="${setor.sigla}">
                        </option>
                    </select>
                </div>

                <div>
                    <label class="field-label">Cargo</label>
                    <input type="text"
                           th:field="*{cargo}"
                           class="input-soft"
                           placeholder="Ex: Analista Pleno"
                           required>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="field-label">Senha Temporária</label>
                    <input type="password"
                           th:field="*{senha}"
                           class="input-soft"
                           placeholder="Defina uma senha temporária"
                           required>
                </div>

                <div>
                    <label class="field-label">Confirmar Senha</label>
                    <input type="password"
                           name="confirmarSenha"
                           class="input-soft"
                           placeholder="Repita a senha"
                           required>
                </div>
            </div>

            <p th:if="${erro}"
               th:text="${erro}"
               class="text-red-600 text-sm font-bold text-center"></p>

            <div class="flex items-center justify-end gap-8 pt-6">
                <a th:href="@{/processos}" class="btn-cancel">Cancelar</a>

                <button type="submit" class="btn-save">
                    Salvar Perfil
                </button>
            </div>
        </form>
    </main>

    <script>
        function formatarCPF(input) {
            let v = input.value.replace(/\D/g, '');
            v = v.slice(0, 11);

            if (v.length > 9) {
                v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/, '$1.$2.$3-$4');
            } else if (v.length > 6) {
                v = v.replace(/(\d{3})(\d{3})(\d{1,3})/, '$1.$2.$3');
            } else if (v.length > 3) {
                v = v.replace(/(\d{3})(\d{1,3})/, '$1.$2');
            }

            input.value = v;
        }
    </script>

</body>
</html>
