<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="conteudo">

    <form th:action="@{/processos/executar-pagamento}"
          method="post"
          enctype="multipart/form-data"
          class="space-y-6">

        <input type="hidden" name="processoId" th:value="${processo.id}" />
        <input type="hidden" name="pagamentoId" th:value="${pagamentoId}" />

        <div>
            <h3 class="text-xs font-bold text-slate-700 mb-2 uppercase flex items-center">
                <i class="bi bi-cloud-upload mr-2 text-base"></i>
                Comprovante de Pagamento
            </h3>

            <div onclick="document.getElementById('comprovante').click()"
                 class="border-2 border-dashed border-slate-300 bg-white rounded-xl p-6 text-center cursor-pointer hover:border-slate-400 transition">

                <i class="bi bi-upload text-2xl text-slate-500 block mb-2"></i>

                <p class="text-sm font-semibold text-slate-600">
                    Clique para anexar o comprovante
                </p>

                <p id="nomeComprovante" class="text-xs text-slate-400 mt-1">
                    Clique para selecionar
                </p>

                <input type="file"
                       id="comprovante"
                       name="comprovante"
                       accept="application/pdf,image/*"
                       required
                       class="hidden"
                       onchange="updateFileName(this, 'nomeComprovante')">
            </div>
        </div>

        <div class="flex justify-end space-x-3 pt-3">

            <button type="submit"
                    class="bg-emerald-500 hover:bg-emerald-600 text-white px-6 py-2 rounded-lg text-sm font-bold shadow">
                Confirmar Pagamento
            </button>
        </div>

    </form>

</div>

</body>
</html>
