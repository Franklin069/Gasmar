<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GasFlow | Notificacoes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #eef2f6;
        }

        .sidebar {
            background: linear-gradient(180deg, #08142d 0%, #142f78 100%);
        }
    </style>
</head>
<body class="min-h-screen">
<div class="flex min-h-screen">
    <aside class="sidebar w-[240px] text-white flex flex-col justify-between py-6 px-5 fixed h-full z-20">
        <div>
            <div class="mb-10 px-1">
                <h1 class="text-2xl font-extrabold tracking-tight leading-none">GASFLOW</h1>
                <p class="text-[9px] text-emerald-400 font-bold tracking-[0.25em] mt-1 uppercase">
                    Inteligencia de Compras
                </p>
            </div>

            <div class="mb-5">
                <p class="text-[8px] uppercase text-white/50 font-bold mb-3 px-2">Principal</p>
                <a th:href="@{/processos}"
                   class="flex items-center gap-2 text-[11px] font-semibold px-3 py-3 mb-2 rounded-full hover:bg-white/10 transition-colors">
                    <span>Dashboard</span>
                </a>
            </div>

            <div class="mb-5" th:if="${session.usuarioLogado != null and session.usuarioLogado.cargo != null and session.usuarioLogado.cargo.name() == 'DEMANDANTE'}">
                <p class="text-[8px] uppercase text-white/50 font-bold mb-3 px-2">Operacoes</p>
                <a th:href="@{/processos/novo}"
                   class="flex items-center gap-2 text-[11px] font-semibold px-3 py-3 mb-2 rounded-full hover:bg-white/10 transition-colors">
                    <span>Requisicoes</span>
                </a>
            </div>

            <div>
                <p class="text-[8px] uppercase text-white/50 font-bold mb-3 px-2">Dados</p>
                <a th:href="@{/processos/todos}"
                   class="flex items-center gap-2 text-[11px] font-semibold px-3 py-3 rounded-full hover:bg-white/10 transition-colors">
                    <span>Todos os Processos</span>
                </a>
            </div>
        </div>

        <div class="bg-white/10 rounded-2xl p-3">
            <div class="flex items-center gap-3 mb-4">
                <div class="w-8 h-8 rounded-full bg-emerald-500 flex items-center justify-center text-xs font-bold">
                    <span th:text="${session.usuarioLogado != null and session.usuarioLogado.nome != null and !#strings.isEmpty(#strings.trim(session.usuarioLogado.nome)) ? #strings.substring(#strings.trim(session.usuarioLogado.nome),0,1) : 'U'}">U</span>
                </div>
                <div class="min-w-0">
                    <p class="text-[10px] font-semibold truncate"
                       th:text="${session.usuarioLogado != null ? session.usuarioLogado.nome : 'Usuario'}">Usuario</p>
                    <p class="text-[8px] text-emerald-300 truncate"
                       th:text="${session.usuarioLogado != null and session.usuarioLogado.setor != null ? session.usuarioLogado.setor.sigla : 'SEM SETOR'}">Perfil</p>
                </div>
            </div>

            <a th:href="@{/sair}" class="text-[8px] uppercase text-red-300 font-bold tracking-wide">
                Encerrar sessao
            </a>
        </div>
    </aside>

    <main class="flex-1 ml-[240px] px-8 py-8">
        <h1 class="text-2xl font-extrabold text-slate-800 mb-4">Notificacoes</h1>
        <div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-8 text-slate-500">
            Nenhuma notificacao cadastrada ainda.
        </div>
    </main>
</div>
</body>
</html>
