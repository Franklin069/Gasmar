<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GasFlow | Nova Requisição</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #eef2f6;
        }

        .sidebar {
            background: linear-gradient(180deg, #08142d 0%, #142f78 100%);
        }

        .form-shell {
            background: #f7f9fb;
            border-radius: 28px;
            box-shadow: 0 14px 36px rgba(15, 23, 42, 0.10);
        }

        .input-soft {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            padding: 0.9rem 1rem;
            font-size: 0.875rem;
            outline: none;
        }

        .input-soft:focus {
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15);
        }

        .upload-box {
            border: 1.5px dashed #86efac;
            background: #f8fffb;
            border-radius: 22px;
            min-height: 84px;
        }

        .menu-active {
            background: rgba(255,255,255,0.12);
            border-radius: 999px;
        }
    </style>
</head>
<body class="min-h-screen">

<div class="flex min-h-screen">

    <!-- SIDEBAR -->
    <aside class="sidebar w-[240px] text-white flex flex-col justify-between py-6 px-5">
        <div>
            <div class="mb-10 px-1">
                <h1 class="text-2xl font-extrabold tracking-tight leading-none">GASFLOW</h1>
                <p class="text-[9px] text-emerald-400 font-bold tracking-[0.25em] mt-1 uppercase">
                    Inteligência de Compras
                </p>
            </div>

            <div class="mb-5">
                <p class="text-[8px] uppercase text-white/50 font-bold mb-3 px-2">Principal</p>

                <a th:href="@{/processos}"
                   class="flex items-center gap-2 text-[11px] font-semibold px-3 py-3 mb-2 rounded-full hover:bg-white/10">
                    <span class="text-sm">◧</span>
                    <span>Dashboard</span>
                </a>
            </div>

            <div class="mb-5">
                <p class="text-[8px] uppercase text-white/50 font-bold mb-3 px-2">Operações</p>

                <a th:href="@{/processos/novo}"
                   class="menu-active flex items-center gap-2 text-[11px] font-semibold px-3 py-3 mb-2">
                    <span class="text-sm">◫</span>
                    <span>Requisições</span>
                </a>
            </div>

            <div>
                <p class="text-[8px] uppercase text-white/50 font-bold mb-3 px-2">Dados</p>

                <a th:href="@{/processos/todos}"
                   class="flex items-center gap-2 text-[11px] font-semibold px-3 py-3 rounded-full hover:bg-white/10">
                    <span class="text-sm">◫</span>
                    <span>Todos os Processos</span>
                </a>
            </div>
        </div>

        <div class="bg-white/10 rounded-2xl p-3">
            <div class="flex items-center gap-3 mb-4">
                <div class="w-8 h-8 rounded-full bg-emerald-500 flex items-center justify-center text-xs font-bold">
                    <span th:text="${#strings.substring(usuarioLogado.nome,0,1)}">U</span>
                </div>
                <div class="min-w-0">
                    <p class="text-[10px] font-semibold truncate" th:text="${usuarioLogado.nome}">Usuário</p>
                    <p class="text-[8px] text-emerald-300 truncate" th:text="${usuarioLogado.perfil}">PERFIL</p>
                </div>
            </div>

            <a th:href="@{/logout}"
               class="text-[8px] uppercase text-red-300 font-bold tracking-wide">
                Encerrar sessão
            </a>
        </div>
    </aside>

    <!-- CONTEÚDO -->
    <main class="flex-1 px-8 py-5">
        <h2 class="text-[22px] font-extrabold text-slate-800 mb-6">Nova Requisição (PABS)</h2>

        <section class="form-shell max-w-[680px] p-6">
            <form th:action="@{/processos/salvar}" method="post" enctype="multipart/form-data" th:object="${processo}" class="space-y-5">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-700 mb-2">Título da Demanda</label>
                        <input type="text"
                               th:field="*{titulo}"
                               class="input-soft w-full"
                               placeholder="Ex: Aquisição de válvulas"
                               required>
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-slate-700 mb-2">Tipo de Processo</label>
                        <select th:field="*{tipoProcesso}" class="input-soft w-full" required>
                            <option value="">Selecione</option>
                            <option value="COMPRA_BEM">Compra de Bem</option>
                            <option value="CONTRATACAO_SERVICO">Contratação de Serviço</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-700 mb-2">Valor Total</label>
                        <input type="number"
                               step="0.01"
                               th:field="*{valorTotal}"
                               class="input-soft w-full"
                               placeholder="Ex: 1500.00"
                               required>
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-slate-700 mb-2">Tipo de Aquisição</label>
                        <select th:field="*{tipoAquisicao}" class="input-soft w-full" required>
                            <option value="">Selecione</option>
                            <option value="CPV">CPV</option>
                            <option value="CONTRATO">Contrato</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div class="upload-box flex flex-col items-center justify-center text-center px-4 py-6">
                        <div class="text-emerald-500 text-2xl mb-2">📄</div>
                        <p class="text-[9px] font-bold text-slate-700 uppercase">Memorial Descritivo</p>
                        <input type="file" name="memorialFile" accept=".pdf" class="mt-3 text-xs">
                    </div>

                    <div class="upload-box flex flex-col items-center justify-center text-center px-4 py-6">
                        <div class="text-emerald-500 text-2xl mb-2">📄</div>
                        <p class="text-[9px] font-bold text-slate-700 uppercase">PABS (Obrigatório)</p>
                        <input type="file" name="pabsFile" accept=".pdf" class="mt-3 text-xs" required>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="upload-box flex flex-col items-center justify-center text-center px-3 py-6">
                        <div class="text-emerald-500 text-xl mb-2">📄</div>
                        <p class="text-[9px] font-bold text-slate-700 uppercase">Mapa de Cotação</p>
                        <input type="file" name="mapaCotacaoFile" accept=".pdf" class="mt-3 text-xs">
                    </div>

                    <div class="upload-box flex flex-col items-center justify-center text-center px-3 py-6">
                        <div class="text-emerald-500 text-xl mb-2">📄</div>
                        <p class="text-[9px] font-bold text-slate-700 uppercase">Propostas</p>
                        <input type="file" name="propostasFile" accept=".pdf" class="mt-3 text-xs">
                    </div>

                    <div class="upload-box flex flex-col items-center justify-center text-center px-3 py-6">
                        <div class="text-emerald-500 text-xl mb-2">📄</div>
                        <p class="text-[9px] font-bold text-slate-700 uppercase">Outros</p>
                        <input type="file" name="outrosFile" accept=".pdf,.png,.jpg,.jpeg" class="mt-3 text-xs">
                    </div>
                </div>

                <div class="flex justify-end gap-3 pt-3">
                    <a th:href="@{/processos}"
                       class="bg-gray-300 text-slate-800 px-8 py-3 rounded-xl font-bold text-sm">
                        Cancelar
                    </a>

                    <button type="submit"
                            class="bg-emerald-500 hover:bg-emerald-600 text-white px-8 py-3 rounded-xl font-bold text-sm">
                        Protocolar
                    </button>
                </div>
            </form>
        </section>
    </main>
</div>

</body>
</html>
